<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="OST Studio">
  <defs>
    <linearGradient id="og" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="20" fill="#0b1020"/>
  <rect x="1" y="1" width="118" height="118" rx="19" fill="none" stroke="url(#ring)" stroke-width="1.35"/>
  <rect x="5" y="5" width="110" height="110" rx="16" fill="none" stroke="#7c3aed" stroke-opacity="0.22" stroke-width="1"/>
  <text x="60" y="58" text-anchor="middle" font-family="Segoe UI, ui-sans-serif, system-ui, sans-serif" font-size="36" font-weight="900" fill="url(#og)" letter-spacing="0.04em" filter="url(#softGlow)">OST</text>
  <text x="60" y="86" text-anchor="middle" font-family="Segoe UI, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#e9d5ff" letter-spacing="0.28em">STUDIO</text>
</svg>
