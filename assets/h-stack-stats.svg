<svg xmlns="http://www.w3.org/2000/svg" width="920" height="60" viewBox="0 0 920 60" role="img" aria-label="Toolkit and GitHub insights">
  <defs>
    <linearGradient id="gline" x1="-240" y1="0" x2="1160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="35%" stop-color="#a855f7"/>
      <stop offset="70%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#f472b6"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 460 30" to="360 460 30" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="0%" r="78%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.42"/>
      <stop offset="72%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="920" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="920" height="60" rx="12" fill="#0b1020"/>
  <rect width="920" height="60" rx="12" fill="url(#spot)"/>
  <rect x="0.5" y="0.5" width="919" height="59" rx="11.5" fill="none" stroke="#7c3aed" stroke-opacity="0.52" stroke-width="1"/>
  <rect x="10" y="6" width="900" height="3" rx="1.5" fill="url(#gline)" opacity="0.9"/>
  <rect x="14" y="54" width="892" height="1" fill="url(#sheen)" opacity="0.85"/>
  <text x="460" y="28" text-anchor="middle" font-family="Segoe UI, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="url(#gline)">
    <tspan x="460" dy="0">Toolkit &amp; stack</tspan>
    <tspan x="460" dy="19" fill="#e9d5ff" font-size="12" font-weight="650">GitHub stats &#183; languages &#183; streak</tspan>
  </text>
</svg>
